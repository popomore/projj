name: Publish npm package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout Git source
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Use Node.js 20
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm install --no-package-lock

    - name: Run verification
      run: npm run lint && npm run test-local
      env:
        HTTP_PROXY: ''
        HTTPS_PROXY: ''
        ALL_PROXY: ''
        NO_PROXY: ''

    - name: Read package metadata
      id: package
      run: |
        echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
        echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Check npm version existence
      id: exists
      run: |
        if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "Package version already exists on npm, skipping publish."
        else
          echo "published=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure npm authentication
      run: |
        if [ -n "$NPM_TOKEN" ]; then
          echo "Using NPM_TOKEN for authentication"
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        else
          echo "Using Trusted Publishing (OIDC) - no token needed"
        fi
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish to npm with provenance
      if: steps.exists.outputs.published == 'false'
      run: npm publish --provenance --access public
